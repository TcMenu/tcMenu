name: Windows nightly

on:
  push:
    branches: ["main"]

jobs:
  build-windows-binary:

    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'liberica'
        cache: maven

    - name: Build tcMenuGenerator binaries
      shell: bash
      run: |
        mvn -B install -DskipTests -Dgpg.skip=true --file api/tcMenuJavaApi/pom.xml
        mvn -B install -DskipTests -Dgpg.skip=true --file api/embedCONTROLCore/pom.xml
        mvn -B install -DskipTests -Dgpg.skip=true --file archive/tcMenuGenerator/pom.xml
        cd archive/tcMenuGenerator/target
        cp classes/img/tcMenuDesigner.ico .
        jpackage --type app-image -n tcmenu \
                 -p jfx/deps \
                 --input jfx/app \
                 --win-console \
                 --resource-dir ./classes/img/ \
                 --icon tcMenuDesigner.ico \
                 --app-version 99.99.99 \
                 --verbose \
                 --java-options "-Dprism.lcdtext=false -Djava.library.path=$APPDIR/win" \
                 --add-modules "jdk.crypto.cryptoki" \
                 -m com.thecoderscorner.tcmenu.menuEditorUI/com.thecoderscorner.menu.editorui.cli.TcMenuDesignerCmd
        cp classes/img/tcMenuDesigner.ico .
        jpackage --type app-image -n tcMenuDesigner \
                 -p jfx/deps \
                 --input jfx/app \
                 --resource-dir ./classes/img/ \
                 --icon tcMenuDesigner.ico \
                 --app-version 99.99.99 \
                 --verbose \
                 --java-options "-Dprism.lcdtext=false -Djava.library.path=$APPDIR/win" \
                 --add-modules "jdk.crypto.cryptoki" \
                 -m com.thecoderscorner.tcmenu.menuEditorUI/com.thecoderscorner.menu.editorui.cli.TcMenuDesignerCmd

    - name: Build Bitmap and Font editor
      shell: bash
      run: |
        mvn -B install -DskipTests -Dgpg.skip=true --file font-bmp-editor/pom.xml
        cd font-bmp-editor/target
        cp classes/img/tcMenuDesigner.ico .
        jpackage --type app-image -n BitMapEdit -p jfx/deps --input jfx/app  \
              --resource-dir ./classes/img --icon tcMenuDesigner.ico --app-version 99.99.99 --verbose \
              --java-options '-Dprism.lcdtext=false  -Djava.library.path=$APPDIR/win' \
              --add-modules "jdk.crypto.cryptoki" \
              -m com.thecoderscorner.bmped/com.thecoderscorner.bmped.BitMapEditApp

    - name: Package EXE and config files
      shell: bash
      run: |
        mkdir -p packaged/app
        cp archive/tcMenuGenerator/target/tcmenu/tcmenu.exe packaged/
        cp archive/tcMenuGenerator/target/tcmenu/app/tcmenu.cfg packaged/app/
        cp archive/tcMenuGenerator/target/tcMenuDesigner/tcMenuDesigner.exe packaged/
        cp archive/tcMenuGenerator/target/tcMenuDesigner/app/tcMenuDesigner.cfg packaged/app/

    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tcmenudesigner_NIGHTLY_windows_exe-${{ github.sha }}.exe
        path: |
          packaged

    - name: Upload Windows BitmapFontEditor artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BitMapEdit_NIGHTLY_windows_exe-${{ github.sha }}.exe
        path: |
          font-bmp-editor/target/BitMapEdit/BitMapEdit.exe
          
          
          
